<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Song Young-Min Guitar Lab - Pro Edition</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background-color: #121212; margin: 0; color: #eee; 
            font-family: 'Malgun Gothic', sans-serif; overflow: hidden; 
            display: flex; flex-direction: column; height: 100vh; 
        }

        /* 상단 바 */
        #top-bar {
            background: #231914; display: flex; justify-content: space-between;
            align-items: center; padding: 10px 15px; height: 80px;
            border-bottom: 3px solid #5d4037; z-index: 20;
        }
        .status-item { text-align: center; flex: 1; }
        .label { font-size: 10px; color: #bcaaa4; display: block; }
        .value { font-size: 18px; color: #ffca28; font-weight: bold; }
        #nextCanvas { background: rgba(0,0,0,0.5); border-radius: 4px; }

        .admin-btns { display: flex; flex-direction: column; gap: 4px; }
        .btn-sm { 
            background: #4e342e; color: #fff; border: 1px solid #8d6e63;
            border-radius: 4px; padding: 5px 12px; font-size: 11px; font-weight: bold;
        }

        /* 게임 영역 */
        #game-container { 
            flex: 1; position: relative; display: flex; 
            justify-content: center; align-items: center; background: #1a1a1a;
        }
        canvas#tetris { 
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), 
                        url('https://images.unsplash.com/photo-1550985616-10810253b84d?q=80&w=400&auto=format&fit=crop');
            background-size: cover; border: 4px solid #5d4037;
            max-width: 95%; max-height: 98%; 
        }
        
        /* 워터마크 */
        #watermark {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(-25deg);
            font-size: 24px; color: rgba(255,255,255,0.06);
            font-weight: 900; text-align: center; pointer-events: none; z-index: 1;
        }

        /* 화음 알림 */
        #chord-notify {
            position: absolute; top: 30%; width: 100%; text-align: center;
            font-size: 34px; font-weight: 900; color: #00e676;
            text-shadow: 0 0 15px #000, 2px 2px 0 #000;
            z-index: 50; pointer-events: none; display: none;
        }

        #msg-box {
            position: absolute; top: 40%; width: 100%; text-align: center;
            font-size: 22px; font-weight: bold; color: #ffca28;
            text-shadow: 2px 2px 4px #000; z-index: 40; pointer-events: none;
        }

        /* 하단 컨트롤러 최적화 */
        #controls {
            background: #231914; display: grid; 
            grid-template-columns: 1fr 1.2fr 1fr 0.8fr; /* 방향키는 크게, 드랍은 작게 */
            gap: 10px; padding: 15px; height: 130px; border-top: 3px solid #5d4037;
        }
        .btn-ctrl {
            background: #6d4c41; color: #fff; border: none; border-radius: 12px;
            font-size: 34px; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 5px #3e2723;
        }
        .btn-ctrl:active { transform: translateY(3px); box-shadow: 0 2px #3e2723; background: #8d6e63; }
        
        /* 드랍 버튼 커스텀 */
        .btn-drop { 
            background: #bf360c; 
            font-size: 16px; 
            font-weight: 900; 
            border-radius: 12px;
            box-shadow: 0 5px #5f1b06;
        }
    </style>
</head>
<body>

<div id="top-bar">
    <div class="status-item">
        <span class="label">NEXT</span>
        <canvas id="nextCanvas" width="36" height="36"></canvas>
    </div>
    <div class="status-item">
        <span class="label">SCORE</span>
        <span id="score" class="value">0</span>
    </div>
    <div class="status-item">
        <span class="label">TIME</span>
        <span id="timer" class="value">00:00</span>
    </div>
    <div class="admin-btns">
        <button class="btn-sm" id="pauseBtn">P/R</button>
        <button class="btn-sm" id="resetBtn">RESET</button>
    </div>
</div>

<div id="game-container">
    <div id="watermark">SONG, YOUNG-MIN<br>Guitar Lab</div>
    <div id="chord-notify">C Major!</div>
    <canvas id="tetris"></canvas>
    <div id="msg-box"></div>
</div>

<div id="controls">
    <button class="btn-ctrl" id="leftBtn">◀</button>
    <button class="btn-ctrl" id="downBtn">▼</button>
    <button class="btn-ctrl" id="rightBtn">▶</button>
    <button class="btn-ctrl btn-drop" id="dropBtn">DROP</button>
</div>

<script>
    const canvas = document.getElementById('tetris');
    const ctx = canvas.getContext('2d');
    const nCanvas = document.getElementById('nextCanvas');
    const nCtx = nCanvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const timeEl = document.getElementById('timer');
    const msgBox = document.getElementById('msg-box');
    const chordNotify = document.getElementById('chord-notify');

    const ROWS = 18, COLS = 10;
    let SQ = 20;

    const NOTES = ['C', 'D', 'E', 'F', 'G', 'A', 'B'];
    const CHORDS = [
        {k:'CEG', n:'C Major'}, {k:'ADF', n:'D minor'}, {k:'BEG', n:'E minor'},
        {k:'ACF', n:'F Major'}, {k:'BDG', n:'G Major'}, {k:'ACE', n:'A minor'}, {k:'BDF', n:'B dim'}
    ];

    let board = [], score = 0, paused = false, gameOver = false;
    let dropStart = Date.now(), gameStart = null, p = null, nextNote = '';

    // 나무 타격음 생성기 (Web Audio)
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playWoodSound() {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine'; // 부드러운 타격음
        osc.frequency.setValueAtTime(180, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(60, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    function resize() {
        const availableHeight = document.getElementById('game-container').clientHeight;
        const availableWidth = document.getElementById('game-container').clientWidth;
        SQ = Math.min(availableWidth / (COLS + 1), availableHeight / (ROWS + 1));
        canvas.width = COLS * SQ;
        canvas.height = ROWS * SQ;
        drawBoard();
    }
    window.addEventListener('resize', resize);

    function initBoard() {
        board = [];
        for(let r=0; r<ROWS; r++) {
            board[r] = [];
            for(let c=0; c<COLS; c++) board[r][c] = {L:null, f:false, h:false, s:1};
        }
    }

    function drawSq(x, y, L, f=false, h=false, scale=1) {
        ctx.save();
        ctx.translate(x*SQ + SQ/2, y*SQ + SQ/2);
        ctx.scale(scale, scale);
        ctx.fillStyle = h ? "#ffd600" : (L ? (f ? "#2e7d32" : (L==='#'||L==='b' ? "#ffb300" : "#4e342e")) : "rgba(255,255,255,0.05)");
        ctx.fillRect(-SQ/2, -SQ/2, SQ, SQ);
        ctx.strokeStyle = h ? "#fff" : "rgba(255,255,255,0.1)";
        ctx.strokeRect(-SQ/2, -SQ/2, SQ, SQ);
        if(L) {
            ctx.fillStyle = (L==='#'||L==='b') ? "#000" : "#fff";
            ctx.font = `bold ${SQ*0.6}px Arial`;
            ctx.textAlign = "center";
            ctx.fillText(L, 0, SQ*0.2);
        }
        ctx.restore();
    }

    function drawBoard() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        for(let r=0; r<ROWS; r++) for(let c=0; c<COLS; c++) drawSq(c, r, board[r][c].L, board[r][c].f, board[r][c].h, board[r][c].s);
    }

    function drawNext() {
        nCtx.clearRect(0,0,40,40);
        nCtx.fillStyle = (nextNote==='#'||nextNote==='b') ? "#ffb300" : "#ef6c00";
        nCtx.fillRect(5,5,30,30);
        nCtx.fillStyle = "#fff"; nCtx.font = "bold 16px Arial"; nCtx.textAlign = "center";
        nCtx.fillText(nextNote, 20, 26);
    }

    function getRand(allowSpecial = true) {
        const r = Math.random();
        if(allowSpecial) {
            if(r < 0.08) return '#';
            if(r < 0.16) return 'b';
        }
        return NOTES[Math.floor(Math.random()*7)];
    }

    class Piece {
        constructor(L) { this.L = L; this.x = 4; this.y = -1; }
        moveDown() {
            if(!this.collision(0,1)) { this.y++; drawBoard(); drawSq(this.x, this.y, this.L, false, false, 1.1); }
            else { playWoodSound(); this.lock(); }
        }
        collision(dx, dy) {
            let nx = this.x + dx, ny = this.y + dy;
            if(nx<0 || nx>=COLS || ny>=ROWS) return true;
            if(ny>=0 && board[ny][nx].L) return true;
            return false;
        }
        lock() {
            if(this.y < 0) { gameOver=true; showMsg("GAME OVER"); return; }
            board[this.y][this.x] = {L: this.L, f: false, h: false, s: 1};
            if(this.L==='#') { 
                let count=0; while(count<8){ 
                    let rr=Math.floor(Math.random()*ROWS), rc=Math.floor(Math.random()*COLS);
                    if(!board[rr][rc].L){ board[rr][rc]={L:getRand(false), f:true, h:false, s:1}; count++; }
                }
                showMsg("SHARP! +8 NOTES");
            }
            if(this.L==='b') {
                for(let r=this.y-1; r<=this.y+1; r++) for(let c=this.x-1; c<=this.x+1; c++)
                    if(r>=0 && r<ROWS && c>=0 && c<COLS) board[r][c]={L:null, f:false, h:false, s:1};
                showMsg("FLAT! BOOM");
            }
            check(); p = new Piece(nextNote); nextNote = getRand(); drawNext();
        }
    }

    async function check() {
        let found = []; let chordNames = new Set();
        const dirs = [[0,1],[1,0],[1,1],[1,-1]];
        for(let r=0; r<ROWS; r++) {
            for(let c=0; c<COLS; c++) {
                if(!board[r][c].L || board[r][c].L==='#' || board[r][c].L==='b') continue;
                dirs.forEach(d => {
                    let s = [];
                    for(let i=0; i<3; i++) {
                        let nr=r+d[0]*i, nc=c+d[1]*i;
                        if(nr>=0 && nr<ROWS && nc>=0 && nc<COLS && board[nr][nc].L) s.push({r:nr, c:nc, L:board[nr][nc].L});
                    }
                    if(s.length===3) {
                        let txt = s.map(v=>v.L).sort().join('');
                        let match = CHORDS.find(ch=>ch.k===txt);
                        if(match || (s[0].L===s[1].L && s[1].L===s[2].L)) {
                            s.forEach(v=>found.push(v)); chordNames.add(match ? match.n : "Trio!");
                        }
                    }
                });
            }
        }
        if(found.length>0) {
            paused = true; chordNotify.innerText = Array.from(chordNames).join(", ");
            chordNotify.style.display = "block";
            const startTime = Date.now();
            const animate = () => {
                const elapsed = Date.now() - startTime;
                if(elapsed < 1000) {
                    found.forEach(v => { board[v.r][v.c].h = true; board[v.r][v.c].s = 1 + (elapsed/1000 * 1.5); });
                    drawBoard(); requestAnimationFrame(animate);
                } else {
                    found.forEach(v => { board[v.r][v.c]={L:null, f:false, h:false, s:1}; });
                    chordNotify.style.display = "none"; score += found.length * 10; scoreEl.innerText = score;
                    gravity(); drawBoard(); paused = false;
                }
            };
            animate();
        }
    }

    function gravity() {
        for(let c=0; c<COLS; c++) for(let r=ROWS-1; r>0; r--) if(!board[r][c].L) {
            for(let k=r-1; k>=0; k--) if(board[k][c].L && !board[k][c].f) {
                board[r][c]=board[k][c]; board[k][c]={L:null, f:false, h:false, s:1}; break;
            }
        }
    }

    function showMsg(t) { msgBox.innerText = t; setTimeout(()=>msgBox.innerText="", 2000); }

    function resetGame() {
        initBoard(); score=0; scoreEl.innerText="0"; gameOver=false; paused=false;
        gameStart = Date.now(); p = new Piece(getRand()); nextNote = getRand();
        chordNotify.style.display = "none"; drawNext(); resize();
    }

    function run() {
        if(!paused && !gameOver) {
            let now = Date.now();
            if(now - dropStart > 850) { p.moveDown(); dropStart = now; }
            let diff = Math.floor((now - gameStart)/1000);
            timeEl.innerText = `${Math.floor(diff/60).toString().padStart(2,'0')}:${(diff%60).toString().padStart(2,'0')}`;
        }
        requestAnimationFrame(run);
    }

    const btn = (id, fn) => {
        document.getElementById(id).addEventListener('touchstart', (e) => { 
            e.preventDefault(); if(!paused && !gameOver) fn(); 
        });
    };
    btn('leftBtn', () => { if(!p.collision(-1,0)) p.x--; drawBoard(); p.draw(); });
    btn('rightBtn', () => { if(!p.collision(1,0)) p.x++; drawBoard(); p.draw(); });
    btn('downBtn', () => p.moveDown());
    btn('dropBtn', () => { while(!p.collision(0,1)) p.y++; p.lock(); playWoodSound(); });
    
    document.getElementById('pauseBtn').addEventListener('click', () => { paused = !paused; showMsg(paused?"PAUSE":"RESUME"); });
    document.getElementById('resetBtn').addEventListener('click', () => { if(confirm("리셋할까요?")) resetGame(); });

    resetGame(); run();
</script>
</body>
</html>
