<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Song, Young-Min Guitar Lab - Mobile Pro</title>
    <style>
        body { 
            background-color: #121212; 
            margin: 0; 
            color: #eee; 
            font-family: 'Malgun Gothic', sans-serif; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            height: 100vh;
            touch-action: manipulation;
        }
        
        /* 상단 정보 및 관리 버튼 영역 */
        #header-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #231914;
            padding: 8px 15px;
            border-bottom: 2px solid #5d4037;
            height: 60px;
        }

        .info-group { display: flex; gap: 15px; align-items: center; }
        .info-box { text-align: center; }
        .info-label { font-size: 10px; color: #bcaaa4; display: block; }
        .info-value { font-size: 16px; color: #ffca28; font-weight: bold; }

        /* 상단으로 옮겨진 관리 버튼 */
        .admin-btn-group { display: flex; gap: 8px; }
        .btn-admin {
            background: #4e342e;
            color: #fff;
            border: 1px solid #8d6e63;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-admin:active { background: #6d4c41; }

        /* 게임 메인 영역 */
        #game-area {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1a1a1a;
        }

        canvas#tetris {
            max-height: 98%;
            max-width: 95%;
            border: 3px solid #4e342e;
            background: #000;
        }

        /* 하단 순수 조작 버튼 (크고 시원하게) */
        #controls {
            background: #231914;
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4칸 구성 */
            gap: 12px;
            padding: 20px;
            height: 140px;
            border-top: 2px solid #5d4037;
        }

        .btn-move {
            background: #6d4c41;
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 5px #3e2723;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-move:active {
            transform: translateY(3px);
            box-shadow: 0 2px #3e2723;
            background: #8d6e63;
        }

        /* DROP 버튼 강조 */
        .btn-drop {
            background: #bf360c;
            grid-column: span 1;
            font-size: 20px;
            font-weight: bold;
        }

        #msg-overlay {
            position: absolute;
            top: 40%;
            width: 100%;
            text-align: center;
            pointer-events: none;
        }
        #msg { font-size: 28px; font-weight: bold; color: #ffca28; text-shadow: 2px 2px 5px #000; }
        #nextCanvas { background: #000; border-radius: 4px; }
    </style>
</head>
<body>

<div id="header-panel">
    <div class="info-group">
        <div class="info-box">
            <span class="info-label">NEXT</span>
            <canvas id="nextCanvas" width="40" height="40"></canvas>
        </div>
        <div class="info-box">
            <span class="info-label">SCORE</span>
            <span id="score" class="info-value">0</span>
        </div>
        <div class="info-box">
            <span class="info-label">TIME</span>
            <span id="timer" class="info-value">00:00</span>
        </div>
    </div>
    
    <div class="admin-btn-group">
        <button class="btn-admin" onclick="paused = !paused; showMsg(paused?'PAUSED':'RESUME')">P/R</button>
        <button class="btn-admin" onclick="confirm('리셋하시겠습니까?') && resetGame()">RESET</button>
    </div>
</div>

<div id="game-area">
    <canvas id="tetris"></canvas>
    <div id="msg-overlay"><div id="msg"></div></div>
</div>

<div id="controls">
    <div class="btn-move" id="leftBtn">◀</div>
    <div class="btn-move" id="downBtn">▼</div>
    <div class="btn-move" id="rightBtn">▶</div>
    <div class="btn-move btn-drop" id="hardDropBtn">DROP</div>
</div>

<script>
    const canvas = document.getElementById('tetris');
    const ctx = canvas.getContext('2d');
    const nextCanvas = document.getElementById('nextCanvas');
    const nCtx = nextCanvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const timerElement = document.getElementById('timer');
    const msgElement = document.getElementById('msg');

    const ROW = 18, COL = 10;
    let SQ = 30; // 초기값

    function resizeCanvas() {
        SQ = Math.min(window.innerWidth / (COL + 1.5), (window.innerHeight - 250) / ROW);
        canvas.width = COL * SQ;
        canvas.height = ROW * SQ;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    const VACANT = "rgba(255, 255, 255, 0.05)";
    const NOTES = ['C', 'D', 'E', 'F', 'G', 'A', 'B'];
    const CHORD_DB = [
        { name: 'C Major', keys: 'CEG', score: 100 },
        { name: 'D minor', keys: 'ADF', score: 50 },
        { name: 'E minor', keys: 'BEG', score: 50 },
        { name: 'F Major', keys: 'ACF', score: 100 },
        { name: 'G Major', keys: 'BDG', score: 100 },
        { name: 'A minor', keys: 'ACE', score: 50 },
        { name: 'B dim',   keys: 'BDF', score: 50 }
    ];

    let board = [];
    let score = 0;
    let paused = false;
    let gameOver = false;
    let dropInterval = 600; 
    let dropStart = Date.now();
    let gameStartTime = null;
    let timerId = null;
    let p, nextP;

    function initBoard() {
        board = [];
        for(let r = 0; r < ROW; r++){
            board[r] = [];
            for(let c = 0; c < COL; c++) board[r][c] = { letter: null, color: VACANT };
        }
    }

    function drawNext() {
        nCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
        if(!nextP) return;
        nCtx.fillStyle = (nextP.letter === '#' || nextP.letter === 'b') ? "#ffb300" : "#ef6c00";
        nCtx.fillRect(5, 5, 30, 30);
        nCtx.fillStyle = "#fff";
        nCtx.font = "bold 16px Arial";
        nCtx.textAlign = "center";
        nCtx.fillText(nextP.letter, 20, 26);
    }

    function drawSquare(x, y, cell) {
        ctx.fillStyle = cell.highlight ? "#ffd600" : (cell.letter ? "#4e342e" : VACANT);
        if(cell.letter === '#' || cell.letter === 'b') ctx.fillStyle = "#ffb300";
        
        ctx.fillRect(x*SQ, y*SQ, SQ, SQ);
        ctx.strokeStyle = "rgba(255,255,255,0.1)";
        ctx.strokeRect(x*SQ, y*SQ, SQ, SQ);
        
        if(cell.letter) {
            ctx.fillStyle = (cell.letter === '#' || cell.letter === 'b') ? "#000" : "#fff";
            ctx.font = `bold ${SQ*0.6}px Arial`;
            ctx.textAlign = "center";
            ctx.fillText(cell.letter, x*SQ + SQ/2, y*SQ + SQ/2 + (SQ*0.2));
        }
    }

    function drawBoard(){
        ctx.clearRect(0,0, canvas.width, canvas.height);
        for(let r = 0; r < ROW; r++){
            for(let c = 0; c < COL; c++) drawSquare(c, r, board[r][c]);
        }
    }

    function getRandomNote() {
        const rand = Math.random();
        let letter = rand < 0.08 ? '#' : (rand < 0.16 ? 'b' : NOTES[Math.floor(Math.random() * NOTES.length)]);
        return { letter };
    }

    class Piece {
        constructor(data) {
            this.letter = data.letter;
            this.x = Math.floor(COL/2) - 1;
            this.y = -1;
        }
        draw() { drawSquare(this.x, this.y, { letter: this.letter, color: "#ef6c00" }); }
        moveDown() {
            if(gameOver || paused) return;
            if(!this.collision(0, 1)){ this.y++; drawBoard(); this.draw(); } 
            else { this.lock(); }
        }
        moveLeft() { if(!this.collision(-1, 0)) { this.x--; drawBoard(); this.draw(); } }
        moveRight() { if(!this.collision(1, 0)) { this.x++; drawBoard(); this.draw(); } }
        collision(x, y) {
            let nX = this.x + x, nY = this.y + y;
            if(nX < 0 || nX >= COL || nY >= ROW) return true;
            if(nY >= 0 && board[nY][nX].letter !== null) return true;
            return false;
        }
        lock() {
            if(this.y < 0) { gameOver = true; showMsg("GAME OVER"); return; }
            board[this.y][this.x] = { letter: this.letter, color: "#4e342e" };
            checkAndProcess();
            if(!gameOver) { p = new Piece(nextP); nextP = getRandomNote(); drawNext(); }
        }
    }

    async function checkAndProcess() {
        let toRemove = new Set();
        const checkDirs = [{dx:1, dy:0}, {dx:0, dy:1}, {dx:1, dy:1}, {dx:-1, dy:1}];
        for(let r=0; r<ROW; r++) {
            for(let c=0; c<COL; c++) {
                if(!board[r][c].letter) continue;
                checkDirs.forEach(dir => {
                    let seq = [];
                    for(let i=0; i<3; i++) {
                        let nr = r + dir.dy*i, nc = c + dir.dx*i;
                        if(nr>=0 && nr<ROW && nc>=0 && nc<COL && board[nr][nc].letter) seq.push({r: nr, c: nc, L: board[nr][nc].letter});
                    }
                    if(seq.length === 3) {
                        let sorted = seq.map(s => s.L).sort().join('');
                        if(CHORD_DB.find(rule => rule.keys === sorted) || (seq[0].L === seq[1].L && seq[1].L === seq[2].L)) {
                            seq.forEach(s => { board[s.r][s.c].highlight = true; toRemove.add(`${s.r},${s.c}`); });
                        }
                    }
                });
            }
        }
        if(toRemove.size > 0) {
            paused = true; score += toRemove.size * 10; scoreElement.innerText = score;
            drawBoard();
            await new Promise(r => setTimeout(r, 400));
            toRemove.forEach(pos => { let [pr, pc] = pos.split(',').map(Number); board[pr][pc] = { letter: null }; });
            for(let c=0; c<COL; c++) {
                for(let r=ROW-1; r>0; r--) {
                    if(!board[r][c].letter) {
                        for(let kr=r-1; kr>=0; kr--) {
                            if(board[kr][c].letter) { board[r][c] = board[kr][c]; board[kr][c] = { letter: null }; break; }
                        }
                    }
                }
            }
            drawBoard(); paused = false; checkAndProcess();
        }
    }

    function updateTimer() {
        if(paused || gameOver) return;
        const diff = Math.floor((Date.now() - gameStartTime) / 1000);
        const m = String(Math.floor(diff/60)).padStart(2,'0'), s = String(diff%60).padStart(2,'0');
        timerElement.innerText = `${m}:${s}`;
    }

    function showMsg(text) {
        msgElement.innerText = text;
        setTimeout(() => { if(msgElement.innerText === text) msgElement.innerText = ""; }, 1500);
    }

    function resetGame() {
        initBoard(); score = 0; scoreElement.innerText = "0";
        gameOver = false; paused = false; gameStartTime = Date.now();
        if(timerId) clearInterval(timerId);
        timerId = setInterval(updateTimer, 1000);
        p = new Piece(getRandomNote()); nextP = getRandomNote();
        drawNext(); drawBoard();
    }

    function drop() {
        let now = Date.now();
        if(now - dropStart > dropInterval && !paused && !gameOver) { p.moveDown(); dropStart = now; }
        requestAnimationFrame(drop);
    }

    const t = (id, fn) => document.getElementById(id).addEventListener('touchstart', (e) => { e.preventDefault(); if(!paused) fn(); });
    t('leftBtn', () => p.moveLeft());
    t('rightBtn', () => p.moveRight());
    t('downBtn', () => p.moveDown());
    t('hardDropBtn', () => { while(!p.collision(0,1)) p.y++; p.lock(); });

    resetGame(); drop();
</script>
</body>
</html>
