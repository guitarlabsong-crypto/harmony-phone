<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Song Young-Min Guitar Lab - Logic Fixed</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; }
        body { 
            background-color: #121212; margin: 0; color: #eee; 
            font-family: 'Malgun Gothic', sans-serif; overflow: hidden; 
            display: flex; flex-direction: column; height: 100vh; 
        }

        /* 시작 로고 화면 */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a1a; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
            transition: opacity 0.5s ease;
        }
        #splash h1 { color: #ffca28; font-size: 28px; margin-bottom: 10px; text-align: center; line-height: 1.4; }

        /* 상단 바 */
        #top-bar {
            background: #231914; display: flex; justify-content: space-between;
            align-items: center; padding: 10px 15px; height: 80px;
            border-bottom: 3px solid #5d4037;
        }
        .status-item { text-align: center; flex: 1; }
        .label { font-size: 10px; color: #bcaaa4; display: block; }
        .value { font-size: 18px; color: #ffca28; font-weight: bold; }
        #nextCanvas { background: rgba(0,0,0,0.5); border-radius: 4px; }

        #game-container { 
            flex: 1; position: relative; display: flex; 
            justify-content: center; align-items: center; background: #1a1a1a;
        }
        canvas#tetris { 
            background: #000; border: 4px solid #5d4037;
            max-width: 95%; max-height: 98%; 
        }
        
        #chord-notify {
            position: absolute; top: 30%; width: 100%; text-align: center;
            font-size: 34px; font-weight: 900; color: #00e676;
            text-shadow: 0 0 15px #000; z-index: 50; pointer-events: none; display: none;
        }

        /* 컨트롤러 레이아웃 */
        #controls {
            background: #231914; display: grid; 
            grid-template-columns: 1fr 1fr 1fr 0.6fr;
            gap: 8px; padding: 12px; height: 130px; border-top: 3px solid #5d4037;
        }
        .btn-ctrl {
            background: #6d4c41; color: #fff; border: none; border-radius: 12px;
            font-size: 38px; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 5px #3e2723;
        }
        .btn-ctrl:active { transform: translateY(3px); box-shadow: 0 2px #3e2723; background: #8d6e63; }
        .btn-drop { background: #bf360c; font-size: 12px; font-weight: 900; height: 60%; align-self: center; border-radius: 8px; box-shadow: 0 3px #5f1b06; }
    </style>
</head>
<body>

<div id="splash">
    <h1>SONG, YOUNG-MIN<br>Guitar Lab</h1>
    <p style="color:#bcaaa4;">Academy Edition</p>
</div>

<div id="top-bar">
    <div class="status-item">
        <span class="label">NEXT</span>
        <canvas id="nextCanvas" width="36" height="36"></canvas>
    </div>
    <div class="status-item">
        <span class="label">SCORE</span>
        <span id="score" class="value">0</span>
    </div>
    <div class="status-item">
        <span class="label">TIME</span>
        <span id="timer" class="value">00:00</span>
    </div>
    <div class="admin-btns" style="display:flex; flex-direction:column; gap:4px;">
        <button id="pauseBtn" style="padding:4px; font-size:10px; background:#4e342e; color:#fff; border:1px solid #8d6e63;">P/R</button>
        <button id="resetBtn" style="padding:4px; font-size:10px; background:#4e342e; color:#fff; border:1px solid #8d6e63;">RESET</button>
    </div>
</div>

<div id="game-container">
    <div id="chord-notify">C Major!</div>
    <canvas id="tetris"></canvas>
</div>

<div id="controls">
    <button class="btn-ctrl" id="leftBtn">◀</button>
    <button class="btn-ctrl" id="downBtn">▼</button>
    <button class="btn-ctrl" id="rightBtn">▶</button>
    <button class="btn-ctrl btn-drop" id="dropBtn">DROP</button>
</div>

<script>
    const canvas = document.getElementById('tetris');
    const ctx = canvas.getContext('2d');
    const nCanvas = document.getElementById('nextCanvas');
    const nCtx = nCanvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const timeEl = document.getElementById('timer');
    const chordNotify = document.getElementById('chord-notify');

    const ROWS = 18, COLS = 10;
    let SQ = 20;

    const NOTES = ['C', 'D', 'E', 'F', 'G', 'A', 'B'];
    const CHORDS = [
        {k:'CEG', n:'C Major', f:[261, 329, 392]},
        {k:'ADF', n:'D minor', f:[293, 349, 440]},
        {k:'BEG', n:'E minor', f:[329, 392, 493]},
        {k:'ACF', n:'F Major', f:[349, 440, 523]},
        {k:'BDG', n:'G Major', f:[392, 493, 587]},
        {k:'ACE', n:'A minor', f:[440, 523, 659]},
        {k:'BDF', n:'Bm(b5)',   f:[493, 587, 698]} // B-D-F (B dim) 순서 상관 없음
    ];

    let board = [], score = 0, paused = false, gameOver = false;
    let dropStart = Date.now(), gameStart = null, p = null, nextNote = '';

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playWoodSound() {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    function playGuitarChord(freqs) {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        freqs.forEach((f, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(f, audioCtx.currentTime + (i * 0.05));
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime + (i * 0.05));
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(audioCtx.currentTime + (i * 0.05)); osc.stop(audioCtx.currentTime + 1.0);
        });
    }

    function resize() {
        const container = document.getElementById('game-container');
        SQ = Math.min(container.clientWidth / (COLS+1), container.clientHeight / (ROWS+1));
        canvas.width = COLS * SQ; canvas.height = ROWS * SQ;
        drawBoard();
    }

    function initBoard() {
        board = Array.from({length: ROWS}, () => Array.from({length: COLS}, () => ({L:null, f:false, h:false, s:1})));
    }

    function drawSq(x, y, L, f=false, h=false, scale=1) {
        ctx.save();
        ctx.translate(x*SQ + SQ/2, y*SQ + SQ/2);
        ctx.scale(scale, scale);
        ctx.fillStyle = h ? "#ffd600" : (L ? (f ? "#2e7d32" : (L==='#'||L==='b' ? "#ffb300" : "#4e342e")) : "rgba(255,255,255,0.05)");
        ctx.fillRect(-SQ/2 + 1, -SQ/2 + 1, SQ - 2, SQ - 2);
        if(L) {
            ctx.fillStyle = (L==='#'||L==='b') ? "#000" : "#fff";
            ctx.font = `bold ${SQ*0.6}px Arial`; ctx.textAlign = "center"; ctx.fillText(L, 0, SQ*0.22);
        }
        ctx.restore();
    }

    function drawBoard() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        for(let r=0; r<ROWS; r++) for(let c=0; c<COLS; c++) drawSq(c, r, board[r][c].L, board[r][c].f, board[r][c].h, board[r][c].s);
        if(p && !gameOver) drawSq(p.x, p.y, p.L, false, false, 1);
    }

    class Piece {
        constructor(L) { this.L = L; this.x = 4; this.y = 0; }
        moveDown() {
            if(!this.collision(0,1)) { this.y++; drawBoard(); }
            else { playWoodSound(); this.lock(); }
        }
        collision(dx, dy) {
            let nx = this.x + dx, ny = this.y + dy;
            if(nx<0 || nx>=COLS || ny>=ROWS) return true;
            if(ny>=0 && board[ny][nx].L) return true;
            return false;
        }
        lock() {
            if(this.y <= 0) { gameOver = true; return; }
            board[this.y][this.x] = {L: this.L, f: false, h: false, s: 1};
            
            // # 블럭 정정: 하나만 쌓여도 랜덤 8개 생성
            if(this.L === '#') {
                let cnt = 0;
                while(cnt < 8) {
                    let rr = Math.floor(Math.random()*ROWS), rc = Math.floor(Math.random()*COLS);
                    if(!board[rr][rc].L) { board[rr][rc]={L:NOTES[Math.floor(Math.random()*7)], f:true, h:false, s:1}; cnt++; }
                }
            }

            if(this.L === 'b') {
                for(let r=this.y-1; r<=this.y+1; r++) for(let c=this.x-1; c<=this.x+1; c++)
                    if(r>=0 && r<ROWS && c>=0 && c<COLS) board[r][c] = {L:null, f:false, h:false, s:1};
            }
            check();
            p = new Piece(nextNote); nextNote = getNote();
            drawNext();
        }
    }

    function getNote() {
        const r = Math.random();
        if(r < 0.1) return '#';
        if(r < 0.15) return 'b';
        return NOTES[Math.floor(Math.random()*7)];
    }

    async function check() {
        let found = []; let chordName = ""; let chordFreq = null;
        const dirs = [[0,1],[1,0],[1,1],[1,-1]];
        for(let r=0; r<ROWS; r++) {
            for(let c=0; c<COLS; c++) {
                if(!board[r][c].L || board[r][c].L==='b') continue;
                dirs.forEach(d => {
                    let s = [];
                    for(let i=0; i<3; i++) {
                        let nr=r+d[0]*i, nc=c+d[1]*i;
                        if(nr>=0 && nr<ROWS && nc>=0 && nc<COLS && board[nr][nc].L) s.push({r:nr, c:nc, L:board[nr][nc].L});
                    }
                    if(s.length===3) {
                        let isSharp = s.every(v => v.L === '#');
                        let txt = s.map(v=>v.L).sort().join('');
                        let match = CHORDS.find(ch=>ch.k === txt);
                        if(isSharp || match || (s[0].L===s[1].L && s[1].L===s[2].L)) {
                            s.forEach(v=>found.push(v));
                            if(isSharp) chordName = "SHARP CLEAN!";
                            else if(match) { chordName = match.n; chordFreq = match.f; }
                            else chordName = "3-MATCH!";
                        }
                    }
                });
            }
        }

        if(found.length>0) {
            paused = true;
            chordNotify.innerText = chordName; chordNotify.style.display = "block";
            if(chordFreq) playGuitarChord(chordFreq);
            
            // 애니메이션 실행
            let start = Date.now();
            const ani = () => {
                let dur = Date.now() - start;
                if(dur < 1000) {
                    found.forEach(v => { board[v.r][v.c].h = true; board[v.r][v.c].s = 1 + (dur/1000 * 2.5); });
                    drawBoard(); requestAnimationFrame(ani);
                } else {
                    found.forEach(v => { board[v.r][v.c] = {L:null, f:false, h:false, s:1}; });
                    chordNotify.style.display = "none"; gravity(); drawBoard(); paused = false;
                }
            };
            ani();
        }
    }

    function gravity() {
        for(let c=0; c<COLS; c++) for(let r=ROWS-1; r>0; r--) if(!board[r][c].L) {
            for(let k=r-1; k>=0; k--) if(board[k][c].L && !board[k][c].f) {
                board[r][c]=board[k][c]; board[k][c]={L:null, f:false, h:false, s:1}; break;
            }
        }
    }

    function drawNext() {
        nCtx.clearRect(0,0,36,36); nCtx.fillStyle = "#ffca28"; nCtx.font = "bold 18px Arial";
        nCtx.textAlign = "center"; nCtx.fillText(nextNote, 18, 24);
    }

    function handleMove(dir) {
        if(paused || gameOver) return;
        if(dir === 'L' && !p.collision(-1,0)) p.x--;
        if(dir === 'R' && !p.collision(1,0)) p.x++;
        if(dir === 'D') p.moveDown();
        drawBoard();
    }

    function startGame() {
        document.getElementById('splash').style.opacity = '0';
        setTimeout(() => document.getElementById('splash').style.display = 'none', 800);
        initBoard(); gameStart = Date.now();
        p = new Piece(getNote()); nextNote = getNote();
        drawNext(); resize(); run();
    }

    function run() {
        if(!paused && !gameOver) {
            let now = Date.now();
            if(now - dropStart > 900) { p.moveDown(); dropStart = now; }
            let diff = Math.floor((now - gameStart)/1000);
            timeEl.innerText = `${Math.floor(diff/60).toString().padStart(2,'0')}:${(diff%60).toString().padStart(2,'0')}`;
        }
        requestAnimationFrame(run);
    }

    document.getElementById('leftBtn').addEventListener('touchstart', (e) => { e.preventDefault(); handleMove('L'); }, {passive: false});
    document.getElementById('rightBtn').addEventListener('touchstart', (e) => { e.preventDefault(); handleMove('R'); }, {passive: false});
    document.getElementById('downBtn').addEventListener('touchstart', (e) => { e.preventDefault(); handleMove('D'); }, {passive: false});
    document.getElementById('dropBtn').addEventListener('touchstart', (e) => { 
        e.preventDefault(); if(!paused && !gameOver) { while(!p.collision(0,1)) p.y++; playWoodSound(); p.lock(); drawBoard(); }
    }, {passive: false});

    window.onload = () => setTimeout(startGame, 2000);
</script>
</body>
</html>
